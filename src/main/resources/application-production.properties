# DATABASE
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.forward-headers-strategy=framework

# EMAIL
app.mail.enabled=${MAIL_ENABLED:true}
app.mail.provider=${MAIL_PROVIDER:resend}
app.mail.from=${MAIL_FROM:no-reply@moneymap.local}
app.mail.resend.api-key=${RESEND_API_KEY:}
app.frontend.verify-url=${MAIL_VERIFY_URL}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://moneymap-sage.vercel.app}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}

spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

spring.mail.properties.mail.debug=false

# ADMIN BOOTSTRAP
app.admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:false}
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.email=${ADMIN_EMAIL:admin@moneymap.com}
app.admin.password=${ADMIN_PASSWORD:}
app.admin.first-name=${ADMIN_FIRST_NAME:System}
app.admin.last-name=${ADMIN_LAST_NAME:Admin}
